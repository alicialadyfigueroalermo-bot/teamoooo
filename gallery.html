<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>💜 Nuestros Videos 💜</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Segoe UI',sans-serif;
}

body{

height:100vh;
overflow:hidden;

background:
radial-gradient(circle at top,
#5a189a 0%,
#3c096c 30%,
#240046 60%,
#10002b 100%);

color:white;
}

h1{

text-align:center;
padding:20px;

font-size:55px;

text-shadow:
0 0 10px #c77dff,
0 0 20px #c77dff,
0 0 40px #9d4edd;
}

.contenedor{

width:100%;
height:75vh;

display:flex;
justify-content:center;
align-items:center;

perspective:2000px;
}

.carrusel{

position:relative;

width:280px;
height:500px;

transform-style:preserve-3d;

animation:girar 25s linear infinite;
}

.item{

position:absolute;

width:280px;
height:500px;

left:0;
top:0;
}

.item video{

width:100%;
height:100%;

object-fit:cover;

border-radius:20px;

border:2px solid #c77dff;

box-shadow:
0 0 20px rgba(199,125,255,.5),
0 0 40px rgba(123,44,191,.5);
}

.item:nth-child(1){
transform:rotateY(0deg) translateZ(500px);
}

.item:nth-child(2){
transform:rotateY(72deg) translateZ(500px);
}

.item:nth-child(3){
transform:rotateY(144deg) translateZ(500px);
}

.item:nth-child(4){
transform:rotateY(216deg) translateZ(500px);
}

.item:nth-child(5){
transform:rotateY(288deg) translateZ(500px);
}

@keyframes girar{

0%{
transform:rotateY(0deg);
}

100%{
transform:rotateY(360deg);
}

}

.volver{

position:fixed;

bottom:25px;
left:50%;

transform:translateX(-50%);

padding:15px 35px;

text-decoration:none;

color:white;

border-radius:50px;

border:1px solid #c77dff;

transition:.3s;
}

.volver:hover{

box-shadow:
0 0 20px #c77dff,
0 0 40px #9d4edd;
}
/* ========================= */
/* RESPONSIVE PARA CELULAR   */
/* ========================= */

@media (max-width:768px){

body{
overflow-x:hidden;
overflow-y:auto;
}

h1{
font-size:34px;
padding:15px;
}

.contenedor{
height:70vh;
}

.carrusel{
width:180px;
height:320px;
}

.item{
width:180px;
height:320px;
}

.item:nth-child(1){
transform:rotateY(0deg) translateZ(280px);
}

.item:nth-child(2){
transform:rotateY(72deg) translateZ(280px);
}

.item:nth-child(3){
transform:rotateY(144deg) translateZ(280px);
}

.item:nth-child(4){
transform:rotateY(216deg) translateZ(280px);
}

.item:nth-child(5){
transform:rotateY(288deg) translateZ(280px);
}

.volver{
padding:12px 25px;
font-size:14px;
}

}

@media (max-width:480px){

h1{
font-size:28px;
}

.carrusel{
width:150px;
height:270px;
}

.item{
width:150px;
height:270px;
}

.item:nth-child(1){
transform:rotateY(0deg) translateZ(220px);
}

.item:nth-child(2){
transform:rotateY(72deg) translateZ(220px);
}

.item:nth-child(3){
transform:rotateY(144deg) translateZ(220px);
}

.item:nth-child(4){
transform:rotateY(216deg) translateZ(220px);
}

.item:nth-child(5){
transform:rotateY(288deg) translateZ(220px);
}

}
</style>
</head>

<body>

<h1>💜 Nuestros Videos 💜</h1>

<div class="contenedor">

<div class="carrusel">

<div class="item">
<video autoplay muted loop playsinline>
<source src="videos/video1.mp4" type="video/mp4">
</video>
</div>

<div class="item">
<video autoplay muted loop playsinline>
<source src="videos/video2.mp4" type="video/mp4">
</video>
</div>

<div class="item">
<video autoplay muted loop playsinline>
<source src="videos/video3.mp4" type="video/mp4">
</video>
</div>

<div class="item">
<video autoplay muted loop playsinline>
<source src="videos/video4.mp4" type="video/mp4">
</video>
</div>

<div class="item">
<video autoplay muted loop playsinline>
<source src="videos/video5.mp4" type="video/mp4">
</video>
</div>

</div>

</div>

<a class="volver" href="index.html">

</a>

</body>
</html>
